services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod

    container_name: backend-starter

    restart: unless-stopped

    env_file:
      - .env.docker

    ports:
      - "5000:5000"

    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:6

    container_name: mongodb

    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
